name: "event_research"
slack_webhook_env: "SLACK_WEBHOOK_EVENT_RESEARCH"
prompt: |
  DataPrism Technologies株式会社向けに、営業リード獲得につながる対面イベントを調査してください。

  会社概要:
  - 製造業・建設業・物流・印刷業向けのAI実装事業を展開
  - 代表取締役が営業を担っており、属人的な営業からの脱却が重要テーマ
  - 地方・中小規模のイベントでも、AI開発競合が少なく目立てる場を重視

  調査対象:
  - 展示会
  - ビジネスマッチングイベント
  - 交流会
  - アクセラレーター
  - ピッチイベント
  - 名刺交換や商談につながる対面イベント全般

  対象地域:
  - 東京都
  - 神奈川県
  - 千葉県
  - 埼玉県

  優先条件:
  - AI開発ニーズがありそうな企業担当者と接点を作れそう
  - 製造、建設、物流、印刷、DX、業務改善、SaaS、スタートアップ、地域企業支援に関連
  - 出展、協賛、参加、登壇のいずれかで商談機会が見込める
  - 開催予定が確認できる、または直近で新規募集・告知が出ている
  - できるだけ公式サイト、主催者ページ、公的機関ページを優先

  除外条件:
  - 一般消費者向け中心のイベント
  - オンライン限定イベント
  - すでに終了していて今年度開催の根拠が弱いもの

  各候補では、DataPrism Technologiesにとっての営業上の relevance を具体的に説明してください。
  出展候補だけでなく、代表や営業担当が参加して名刺交換できそうな場も含めてください。
search_queries:
  - "展示会 AI DX 製造 建設 物流 印刷 東京 2026"
  - "ビジネスマッチング 交流会 中小企業 DX 東京 神奈川 千葉 埼玉 2026"
  - "産業振興 展示会 商工会議所 イベント 東京 神奈川 千葉 埼玉 2026"
  - "アクセラレーター ピッチ スタートアップ イベント 東京 神奈川 千葉 埼玉 2026"
  - "ものづくり 建設 物流 印刷 展示会 商談会 関東 2026"
